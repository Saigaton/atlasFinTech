<ul class="checklist" role="list" aria-label="Requisitos de senha">
    @for (rule of rules; track rule.label) {
      <li
        class="checklist-item"
        [class.valid]="rule.valid"
        [attr.aria-label]="rule.label + (rule.valid ? ' — atendido' : ' — pendente')"
      >
        <span class="check-icon" aria-hidden="true">
          @if (rule.valid) {
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          } @else {
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          }
        </span>
        <span class="check-label">{{ rule.label }}</span>
      </li>
    }
</ul>
